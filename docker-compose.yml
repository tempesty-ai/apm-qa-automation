version: "3.8"

services:
  db:
    image: postgres:15
    container_name: apm-postgres
    environment:
      POSTGRES_DB: apm_db
      POSTGRES_USER: apm_user
      POSTGRES_PASSWORD: apm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./collector/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apm_user -d apm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  collector:
    build: ./collector/server
    container_name: apm-collector
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: apm_db
      DB_USER: apm_user
      DB_PASS: apm_pass
    depends_on:
      db:
        condition: service_healthy

  agent-tomcat:
    build: ./agents/tomcat
    container_name: apm-agent-tomcat
    environment:
      AGENT_ID: tomcat-agent-01
      WAS_TYPE: tomcat
      COLLECTOR_URL: http://collector:8080
    depends_on:
      - collector

volumes:
  postgres_data:
